name: MVFMNet_test_DF2K_x3SR
model_type: SRModel
scale: 3
num_gpu: 1  # set num_gpu: 0 for cpu mode
manual_seed: 0

datasets:
  test_1:  # the 1st test dataset
    name: Set5
    type: PairedImageDataset
    dataroot_gt: datasets/valid/Set5/X3/GT
    dataroot_lq: datasets/valid/Set5/X3/LR
    io_backend:
      type: disk

  test_2:  # the 2nd test dataset
    name: Set14
    type: PairedImageDataset
    dataroot_gt: datasets/valid/Set14/X3/GT
    dataroot_lq: datasets/valid/Set14/X3/LR
    io_backend:
      type: disk

  test_3:  # the 1st test dataset
    name: B100
    type: PairedImageDataset
    dataroot_gt: datasets/valid/BSDS100/X3/GT
    dataroot_lq: datasets/valid/BSDS100/X3/LR
    io_backend:
      type: disk

  test_4:  # the 2nd test dataset
    name: Urban100
    type: PairedImageDataset
    dataroot_gt: datasets/valid/Urban100/X3/GT
    dataroot_lq: datasets/valid/Urban100/X3/LR
    io_backend:
      type: disk

  test_5:  # the 1st test dataset
    name: Manga109
    type: PairedImageDataset
    dataroot_gt: datasets/valid/Manga109/X3/GT
    dataroot_lq: datasets/valid/Manga109/X3/LR
    io_backend:
      type: disk

  test_6:
    name: DIV2K_val100
    type: PairedImageDataset
    dataroot_gt: datasets/valid/DIV2K_valid/DIV2K_valid_HR
    dataroot_lq: datasets/valid/DIV2K_valid/DIV2K_valid_LR_bicubic/X3
    filename_tmpl : "{}x3"
    io_backend:
      type: disk
  
  test_7:
    name: RS-T1
    type: PairedImageDataset
    dataroot_gt: datasets/valid/RS-1/HR
    dataroot_lq: datasets/valid/RS-1/LR_bicubic/x3
    filename_tmpl : "{}x3"
    io_backend:
      type: disk
  
  test_8:
    name: RS-T2
    type: PairedImageDataset
    dataroot_gt: datasets/valid/RS-2/HR
    dataroot_lq: datasets/valid/RS-2/LR_bicubic/x3
    filename_tmpl : "{}x3"
    io_backend:
      type: disk


# network structures
network_g:
  type: MVFMNet
  dim: 36
  n_blocks: 8
  ffn_scale: 2
  upscaling_factor: 3


# path
path:
  pretrain_network_g: pretrained_models/MVFMNet/MVFMNet_DF2K_x3SR.pth
  strict_load_g: true
  param_key_g: params_ema

# validation settings
val:
  save_img: false
  suffix: ~  # add suffix to saved images, if None, use exp name

  metrics:
    psnr: # metric name, can be arbitrary
      type: calculate_psnr
      crop_border: 3
      test_y_channel: true  # false for remote-sensing
    ssim:
      type: calculate_ssim
      crop_border: 3
      test_y_channel: true  # false for remote-sensing
