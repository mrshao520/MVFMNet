name: MVFMNet_test_UCMerced_x3SR
model_type: SRModel
scale: 3
num_gpu: 1  # set num_gpu: 0 for cpu mode
manual_seed: 0

datasets:
  test_1:
    name: UCMerced_val
    type: PairedImageDataset
    dataroot_gt: datasets/UCMerced/val/HR_x3
    dataroot_lq: datasets/UCMerced/val/LR_x3
    io_backend:
      type: disk

  test_2:
    name: UCMerced_test
    type: PairedImageDataset
    dataroot_gt: datasets/UCMerced/test/HR_x3
    dataroot_lq: datasets/UCMerced/test/LR_x3
    io_backend:
      type: disk

# network structures
network_g:
  type: MVFMNet
  dim: 36
  n_blocks: 8
  ffn_scale: 2
  upscaling_factor: 3


# path
path:
  pretrain_network_g: pretrained_models/MVFMNet/MVFMNet_UC_x3SR.pth
  strict_load_g: true
  param_key_g: params_ema

# validation settings
val:
  save_img: false
  suffix: ~  # add suffix to saved images, if None, use exp name

  metrics:
    psnr: # metric name, can be arbitrary
      type: calculate_psnr
      crop_border: 3
      test_y_channel: false  # false for remote-sensing
    ssim:
      type: calculate_ssim
      crop_border: 3
      test_y_channel: false  # false for remote-sensing
    scc:
      type: calculate_scc
      crop_border: 3
      test_y_channel: false # false for Remote-sensing
    sam:
      type: calculate_sam
      crop_border: 3
      test_y_channel: false # false for Remote-sensing
